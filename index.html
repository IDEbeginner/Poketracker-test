<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PokéTracker — Collections Pokémon TCG</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PokéTracker">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#12121f;--card:#161625;--border:rgba(255,255,255,0.06);--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--text4:#334155;--green:#4ade80;--red:#f87171;--blue:#3b82f6;--purple:#8b5cf6;--pink:#ec4899;--gold:#ffd700;--sar-pink:#ff6eb4;--ma-orange:#ff4500;--ur-blue:#00bfff;--ir-purple:#da70d6}
body{background:linear-gradient(145deg,var(--bg) 0%,var(--bg2) 40%,#0d1117 100%);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text4);border-radius:3px}
input,button{font-family:'Outfit',sans-serif}
button{cursor:pointer}

/* Auth Screen */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(–card);border:1px solid var(–border);border-radius:16px;padding:32px;width:100%;max-width:380px}
.auth-box h1{font-size:24px;font-weight:800;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-box .subtitle{text-align:center;color:var(–text2);font-size:13px;margin-bottom:24px}
.auth-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#ffffff;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s;-webkit-text-fill-color:#ffffff}
.auth-input::placeholder{color:#94a3b8;-webkit-text-fill-color:#94a3b8}
.auth-input:focus{border-color:var(–blue);background:rgba(255,255,255,0.1)}
.auth-btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;transition:all .2s;margin-bottom:8px}
.auth-btn.primary{background:linear-gradient(135deg,var(–blue),var(–purple));color:#fff}
.auth-btn.primary:hover{transform:translateY(-1px);filter:brightness(1.1)}
.auth-btn.google{background:rgba(255,255,255,0.06);color:var(–text);border:1px solid var(–border)}
.auth-btn.google:hover{background:rgba(255,255,255,0.1)}
.auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(–text3)}
.auth-toggle span{color:var(–blue);cursor:pointer;font-weight:600}
.auth-toggle span:hover{text-decoration:underline}
.auth-forgot{text-align:center;margin-top:8px;color:#94a3b8;font-size:13px;cursor:pointer;transition:color .2s}
.auth-forgot:hover{color:#ffffff}
.auth-error{color:var(–red);font-size:12px;text-align:center;margin-bottom:10px;min-height:16px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(–text3);font-size:12px}
.auth-divider::before,.auth-divider::after{content:’’;flex:1;height:1px;background:var(–border)}

/* App */
#app-screen{display:none}
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-bottom:1px solid var(–border);padding:16px 20px 16px}
.header-top{display:flex;align-items:center;justify-content:space-between;max-width:800px;margin:0 auto}
.header-title{display:flex;align-items:center;gap:10px}
.header-title h1{font-size:20px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:12px;color:var(–text3);margin-left:38px;margin-top:2px}
.user-info{display:flex;align-items:center;gap:8px}
.profile-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:linear-gradient(135deg,var(–blue),var(–purple));color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;overflow:hidden;padding:0}
.profile-btn:hover{transform:scale(1.08);border-color:rgba(255,255,255,0.3)}
.profile-menu{position:absolute;top:60px;right:20px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:14px;width:260px;z-index:150;box-shadow:0 16px 48px rgba(0,0,0,0.6);overflow:hidden;animation:menuSlide .2s}
@keyframes menuSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.pm-header{padding:16px;border-bottom:1px solid var(–border)}
.pm-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(–blue),var(–purple));color:#fff;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;padding:0}
.pm-name{font-size:14px;font-weight:700;color:var(–text);margin-bottom:2px}
.pm-email{font-size:11px;color:var(–text3);word-break:break-all}
.pm-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13px;font-weight:600;color:var(–text2);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:‘Outfit’,sans-serif}
.pm-item:hover{background:rgba(255,255,255,0.05)}
.pm-item .pm-icon{font-size:16px;width:20px;text-align:center}
.pm-item.danger{color:var(–red)}
.pm-item.danger:hover{background:rgba(248,113,113,0.08)}
.pm-sep{height:1px;background:var(–border);margin:0}
.pm-overlay{position:fixed;inset:0;z-index:140}

/* Account page */
.account-page{max-width:500px;margin:0 auto;padding:20px}
.account-back{display:flex;align-items:center;gap:6px;color:var(–text3);font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;margin-bottom:20px;font-family:‘Outfit’,sans-serif;padding:6px 0}
.account-back:hover{color:var(–text)}
.account-section{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:20px;margin-bottom:16px}
.account-section h3{font-size:15px;font-weight:700;color:var(–text);margin-bottom:14px}
.account-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.account-row:last-child{margin-bottom:0}
.account-label{font-size:12px;color:var(–text3);font-weight:600;margin-bottom:4px}
.account-value{font-size:14px;color:var(–text);font-weight:500}
.account-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-size:13px;outline:none;margin-bottom:8px;font-family:‘Outfit’,sans-serif;-webkit-text-fill-color:#fff}
.account-input::placeholder{color:#64748b;-webkit-text-fill-color:#64748b}
.account-input:focus{border-color:var(–blue)}
.account-save{padding:8px 20px;border-radius:8px;border:none;font-size:12px;font-weight:700;background:linear-gradient(135deg,var(–blue),var(–purple));color:#fff;transition:all .2s;font-family:‘Outfit’,sans-serif}
.account-save:hover{filter:brightness(1.1);transform:translateY(-1px)}
.account-save:disabled{opacity:.5;cursor:not-allowed;transform:none}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:8px 0}
.avatar-opt{width:100%;aspect-ratio:1;border-radius:12px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:4px}
.avatar-opt:hover{border-color:rgba(255,255,255,0.2);transform:scale(1.08)}
.avatar-opt.selected{border-color:var(–blue);background:rgba(96,165,250,0.15);box-shadow:0 0 12px rgba(96,165,250,0.3)}
.avatar-opt img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}

/* Friends */
.friend-card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.friend-avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.friend-avatar img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:14px;font-weight:600;color:var(–text)}
.friend-code-small{font-size:11px;color:var(–text3);font-family:monospace}
.friend-btn{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.friend-btn.primary{background:var(–blue);color:white}
.friend-btn.accept{background:#4ade80;color:#000}
.friend-btn.reject{background:rgba(248,113,113,0.15);color:#f87171;margin-left:4px}
.friend-btn.view{background:rgba(96,165,250,0.15);color:#60a5fa}
.friend-code-box{background:rgba(255,255,255,0.05);border:2px dashed rgba(255,255,255,0.15);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px}
.friend-code-display{font-size:28px;font-weight:800;letter-spacing:4px;color:#60a5fa;font-family:monospace;margin:6px 0}
.friend-code-label{font-size:12px;color:var(–text3)}
.friend-add-row{display:flex;gap:8px;margin-bottom:16px}
.friend-add-row input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(–border);background:rgba(255,255,255,0.06);color:white;font-size:14px;font-family:monospace;text-transform:uppercase;letter-spacing:2px}
.friend-section-title{font-size:13px;font-weight:700;color:var(–text2);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.friend-empty{text-align:center;color:var(–text3);font-size:13px;padding:20px}
.friend-set-card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:10px}
.account-msg{font-size:12px;margin-top:8px;min-height:16px}
.account-msg.success{color:var(–green)}
.account-msg.error{color:var(–red)}

/* Collection picker — series accordion */
.series-block{background:var(–card);border:1px solid var(–border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.series-block:hover{border-color:rgba(255,255,255,0.12)}
.series-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.series-header:hover{background:rgba(255,255,255,0.03)}
.series-logo{width:40px;height:40px;border-radius:8px;object-fit:contain;background:rgba(255,255,255,0.04);flex-shrink:0}
.series-info{flex:1;min-width:0}
.series-name{font-size:14px;font-weight:700;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.series-meta{font-size:11px;color:var(–text3)}
.series-arrow{color:var(–text3);font-size:14px;transition:transform .2s;flex-shrink:0}
.series-arrow.open{transform:rotate(90deg)}
.series-sets{display:none;padding:0 12px 12px}
.series-sets.open{display:block}
.set-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent;margin-bottom:4px}
.set-item:hover{background:rgba(255,255,255,0.04);transform:translateX(4px)}
.set-item.active{border-color:var(–blue);background:rgba(59,130,246,0.08)}
.set-item .set-logo{width:32px;height:32px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,0.04);flex-shrink:0}
.set-item .set-name{flex:1;font-size:13px;font-weight:500;color:var(–text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.set-item .set-count{font-size:11px;color:var(–text3);font-family:‘JetBrains Mono’,monospace;flex-shrink:0}
.set-item .set-badge{font-size:10px;font-weight:700;color:var(–green);background:rgba(74,222,128,0.1);padding:2px 7px;border-radius:5px;flex-shrink:0}

/* Progress */
.progress-section{max-width:800px;margin:0 auto;padding:16px 20px 8px}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-pct{font-size:32px;font-weight:900;font-family:‘JetBrains Mono’,monospace;color:#f1f5f9}
.progress-count{font-size:13px;color:var(–text2);font-family:‘JetBrains Mono’,monospace}
.progress-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.type-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;max-width:800px;margin-left:auto;margin-right:auto;padding:0 20px}
.type-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid transparent;transition:all .15s;cursor:pointer;background:rgba(255,255,255,0.04);color:var(–text3)}
.type-chip:hover{transform:scale(1.05);filter:brightness(1.2)}
.type-chip.active{background:rgba(255,255,255,0.08)}
.type-chip .chip-count{font-family:‘JetBrains Mono’,monospace;font-size:10px}

/* Controls */
.controls{max-width:800px;margin:0 auto;padding:12px 20px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(–border);background:rgba(255,255,255,0.03);color:var(–text3);transition:all .2s}
.filter-btn:hover{transform:translateY(-1px)}
.filter-btn.active{border-color:currentColor}
.search-input{width:100%;padding:10px 16px;border-radius:10px;border:1px solid var(–border);background:rgba(255,255,255,0.08);color:#ffffff;font-size:14px;outline:none;margin-bottom:8px;-webkit-text-fill-color:#ffffff}
.search-input::placeholder{color:#94a3b8;-webkit-text-fill-color:#94a3b8}
.search-input:focus{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.10)}
.rarity-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.rarity-btn{padding:3px 9px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid var(–border);background:rgba(255,255,255,0.03);color:var(–text3);transition:all .15s}
.rarity-btn.active{border-color:currentColor}
.results-info{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(–text3);margin-bottom:4px}

/* Card list */
.card-list{max-width:800px;margin:0 auto;padding:0 20px 100px}
.card-row{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:3px;border-radius:10px;cursor:pointer;transition:all .15s;user-select:none;border:1px solid transparent}
.card-row:hover{transform:translateX(4px)}
.card-row:active{transform:scale(.99)}
.card-row.owned{background:rgba(74,222,128,0.10);border-color:rgba(74,222,128,0.25)}
.card-row.missing{background:rgba(248,113,113,0.07);border-color:rgba(248,113,113,0.15)}
.card-row.secret{border-color:rgba(218,112,214,0.2)}
.card-row.secret.sar{border-color:rgba(255,110,180,0.25)}
.card-row.secret.gold{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.08)}
.card-row.secret.ma{border-color:rgba(255,69,0,0.25)}
.check{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(–text4);transition:all .15s;font-size:12px;font-weight:900;color:var(–bg)}
.check.checked{background:var(–green);border:none}
.card-num{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:600;color:var(–text3);width:42px;flex-shrink:0;text-align:right}
.card-thumb{width:32px;height:44px;border-radius:4px;object-fit:cover;background:rgba(255,255,255,0.04);flex-shrink:0}
.card-thumb.no-img{display:flex;align-items:center;justify-content:center;font-size:14px;color:var(–text4)}
.card-icon{font-size:13px;flex-shrink:0}
.card-name{flex:1;font-size:13px;font-weight:500;color:var(–text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-row.owned .card-name{color:var(–text2);font-weight:400;text-decoration:line-through;text-decoration-color:rgba(74,222,128,0.4)}
.card-rarity{font-size:11px;font-weight:700;font-family:‘JetBrains Mono’,monospace;flex-shrink:0}
.empty-state{text-align:center;padding:60px 20px;color:var(–text4);font-size:15px;font-weight:500}
.empty-icon{font-size:36px;display:block;margin-bottom:10px}
.eye-btn{width:28px;height:28px;border-radius:6px;border:none;background:rgba(255,255,255,0.06);color:var(–text3);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0}
.eye-btn:hover{background:rgba(255,255,255,0.12);color:var(–text)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal-box{position:relative;max-width:360px;width:100%;text-align:center}
.modal-close{position:absolute;top:-40px;right:0;background:rgba(255,255,255,0.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:201}
.modal-close:hover{background:rgba(255,255,255,0.2)}
.modal-img{width:100%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal-info{margin-top:12px;color:var(–text2);font-size:13px;font-weight:600}
.modal-loading{color:var(–text3);font-size:14px;padding:40px}
.modal-error{color:var(–text3);font-size:13px;padding:20px}
.modal-error a{color:var(–blue);text-decoration:underline}

/* Saving indicator */
.saving{position:fixed;top:12px;right:12px;background:rgba(59,130,246,0.15);color:var(–blue);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(59,130,246,0.3);z-index:100;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:16px;color:var(–text2)}
.spinner{width:24px;height:24px;border:3px solid var(–text4);border-top-color:var(–blue);border-radius:50%;animation:spin .6s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.inline-spinner{width:16px;height:16px;border:2px solid var(–text4);border-top-color:var(–blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}

/* Sealed rows */
.sealed-row{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:3px;border-radius:10px;cursor:pointer;transition:all .15s;user-select:none;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.sealed-row:hover{transform:translateX(4px)}
.sealed-row.owned{background:rgba(74,222,128,0.10);border-color:rgba(74,222,128,0.25)}
.sealed-row .sealed-icon{width:32px;height:32px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,0.04);padding:2px}
.sealed-row .sealed-name{flex:1;font-size:13px;font-weight:500;color:var(–text)}
.sealed-row.owned .sealed-name{color:var(–text2);text-decoration:line-through;text-decoration-color:rgba(74,222,128,0.4)}
tcg-divider{display:flex;align-items:center;gap:12px;margin:28px 0 16px;color:var(--text3);font-size:12px;font-weight:600;letter-spacing:.5px}
.tcg-divider::before,.tcg-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.tcg-search{width:100%;padding:10px 16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.08);color:#fff;font-size:13px;outline:none;margin-bottom:12px;-webkit-text-fill-color:#fff}
.tcg-search::placeholder{color:#64748b;-webkit-text-fill-color:#64748b}
.tcg-search:focus{border-color:rgba(255,255,255,0.2)}
.tcg-series{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden}
.tcg-series-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.tcg-series-head:hover{background:rgba(255,255,255,0.03)}
.tcg-series-logo{width:32px;height:32px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,0.04)}
.tcg-series-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.tcg-series-meta{font-size:11px;color:var(--text4)}
.tcg-series-arrow{color:var(--text4);font-size:11px;transition:transform .2s}

const TCGDEX = "https://api.tcgdex.net/v2/fr";
const _tcgCache = {};
async function tcgFetch(p) { if (_tcgCache[p]) return _tcgCache[p]; const r = await fetch(TCGDEX+p); if (!r.ok) throw new Error("TCGdex "+r.status); const d = await r.json(); _tcgCache[p] = d; return d; }

const TYPE_MAP_TCG = {Grass:"grass",Fire:"fire",Water:"water",Lightning:"electric",Psychic:"psychic",Fighting:"fighting",Darkness:"darkness",Metal:"steel",Dragon:"dragon",Colorless:"colorless",Fairy:"psychic"};
const RARITY_MAP_TCG = {"Commune":"C","Peu Commune":"U","Rare":"R","Double Rare":"RR","Ultra Rare":"UR","Illustration Rare":"IR","Special Art Rare":"SAR","Hyper Rare":"GOLD","Secret Rare":"GOLD","Art Rare":"IR","Shiny Rare":"IR","Shiny Ultra Rare":"UR","Crown Rare":"GOLD","ACE SPEC Rare":"R","Amazing Rare":"R"};

function tcgSetToLocal(setData) {
  if (!setData || !setData.cards) return null;
  const cards = setData.cards.map(c => {
    const t = (c.types && c.types[0]) ? (TYPE_MAP_TCG[c.types[0]] || "colorless") : (c.category === "Trainer" || c.category === "Dresseur" ? "trainer" : c.category === "Energy" || c.category === "\u00c9nergie" ? "energy" : "colorless");
    const r = c.rarity ? (RARITY_MAP_TCG[c.rarity] || "C") : "C";
    return { n: parseInt(c.localId) || c.localId, name: c.name || "???", type: t, rarity: r, _img: c.image || null };
  });
  cards.sort((a,b) => { const na = typeof a.n === 'number' ? a.n : 0; const nb = typeof b.n === 'number' ? b.n : 0; return na - nb; });
  const mainCount = cards.filter(c => !["IR","UR","SAR","MA","GOLD"].includes(c.rarity)).length;
  const logo = setData.logo ? setData.logo + "/low.webp" : "";
  return {
    id: "tcg_" + setData.id, name: setData.name || setData.id, icon: "\ud83c\udfb4", logo: logo,
    tcgId: setData.id, tcgdexIds: [setData.id], mainCount: mainCount, cards: cards, sealed: [], _isDynamic: true
  };
}

async function loadAndAddTcgSet(tcgSetId) {

    SETS[loadingKey] = localSet;
    activeSet = loadingKey;
    return true;
  } catch(e) { console.error("TCGdex load error:", e); return false; }
}

// ==================== TCGdex API LAYER ====================
const TCGDEX_BASE = "https://api.tcgdex.net/v2/fr";
const apiCache = {};

async function apiFetch(path) {
  if (apiCache[path]) return apiCache[path];
  const r = await fetch(`${TCGDEX_BASE}${path}`);
  if (!r.ok) throw new Error(`API ${r.status}`);
  const data = await r.json();
  apiCache[path] = data;
  return data;
}

// ==================== TYPE & RARITY META ====================
const TYPE_META = {grass:{icon:"🌿"},fire:{icon:"🔥"},water:{icon:"💧"},electric:{icon:"⚡"},psychic:{icon:"🔮"},fighting:{icon:"👊"},darkness:{icon:"🌑"},steel:{icon:"⚙️"},dragon:{icon:"🐉"},colorless:{icon:"⭐"},normal:{icon:"⭐"},fairy:{icon:"🧚"},metal:{icon:"⚙️"},trainer:{icon:"🎒"},energy:{icon:"✨"}};
const RARITY_SYM = {"Commune":"●","Common":"●","Peu Commune":"◆","Uncommon":"◆","Rare":"★","Ultra Rare":"💎","Illustration Rare":"🎨","Special Art Rare":"🌟","Hyper Rare":"👑","Secret Rare":"👑","Art Rare":"🎨","Amazing Rare":"⭐","ACE SPEC Rare":"🔥","Double Rare":"★★","Shiny Rare":"✨","Shiny Ultra Rare":"✨💎","Crown Rare":"👑"};
const RARITY_COLOR = {"Commune":"#475569","Common":"#475569","Peu Commune":"#475569","Uncommon":"#475569","Rare":"#c084fc","Ultra Rare":"#00bfff","Illustration Rare":"#da70d6","Special Art Rare":"#ff6eb4","Hyper Rare":"#ffd700","Secret Rare":"#ffd700","Art Rare":"#da70d6","Amazing Rare":"#fbbf24","ACE SPEC Rare":"#ff4500","Double Rare":"#fbbf24","Shiny Rare":"#22d3ee","Shiny Ultra Rare":"#22d3ee","Crown Rare":"#ffd700"};

function getTypeIcon(types, category) {
  if (category === "Trainer" || category === "Dresseur") return "🎒";
  if (category === "Energy" || category === "Énergie") return "✨";
  if (!types || types.length === 0) return "⭐";
  const t = types[0].toLowerCase();
  return TYPE_META[t]?.icon || "⭐";
}

function getTypeName(types, category) {
  if (category === "Trainer" || category === "Dresseur") return "trainer";
  if (category === "Energy" || category === "Énergie") return "energy";
  if (!types || types.length === 0) return "colorless";
  return types[0].toLowerCase();
}

function getRarityShort(r) {
  if (!r) return "?";
  return RARITY_SYM[r] || r.substring(0, 3);
}
function getRarityColor(r) {
  if (!r) return "#475569";
  return RARITY_COLOR[r] || "#475569";
}

function isSecretRare(r) {
  if (!r) return false;
  const upper = r.toLowerCase();
  return upper.includes("ultra") || upper.includes("illustration") || upper.includes("special art") || upper.includes("hyper") || upper.includes("secret") || upper.includes("art rare") || upper.includes("amazing") || upper.includes("shiny") || upper.includes("crown");
}

// ==================== FIRESTORE ====================
const IDB_NAME='poketracker-offline',IDB_STORE='collections';
function openIDB(){return new Promise((r,j)=>{const q=indexedDB.open(IDB_NAME,1);q.onupgradeneeded=()=>q.result.createObjectStore(IDB_STORE);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function saveLocal(u,d){try{const b=await openIDB(),t=b.transaction(IDB_STORE,'readwrite');t.objectStore(IDB_STORE).put(d,u);await new Promise((r,j)=>{t.oncomplete=r;t.onerror=j})}catch(e){}}
async function loadLocal(u){try{const b=await openIDB(),t=b.transaction(IDB_STORE,'readonly'),q=t.objectStore(IDB_STORE).get(u);return new Promise((r,j)=>{q.onsuccess=()=>r(q.result||null);q.onerror=j})}catch(e){return null}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
let isOffline = false;

window.addEventListener('online', async () => {
  if (!currentUser) return;
  const uid = currentUser.uid;
  const local = await loadLocal(uid);
  if (!local || !local.sets) return;
  try {
    const snap = await getDoc(doc(db, "collections", uid));
    let remote = snap.exists() ? snap.data() : {};
    let remoteSets = remote.sets || {};
    let merged = { ...remoteSets, ...local.sets };
    await setDoc(doc(db, "collections", uid), { sets: merged, avatar: local.avatar || remote.avatar || null, updatedAt: new Date().toISOString(), email: currentUser.email || "" });
    await saveLocal(uid, { sets: merged, avatar: local.avatar || remote.avatar });
    isOffline = false;
  } catch(e) {}
});

async function loadCollection(uid) {
  try {
    const snap = await getDoc(doc(db, "collections", uid));
    if (snap.exists()) {
      const data = snap.data();
      if (activeSetId && data.sets && data.sets[activeSetId]) {
        owned = new Set(data.sets[activeSetId]);
      } else { owned = new Set(); }
      if (data.avatar) userAvatar = data.avatar;
      if (data.sealed && activeSetId && data.sealed[activeSetId]) sealedOwned = new Set(data.sealed[activeSetId]); else sealedOwned = new Set();
      isOffline = false;
      await saveLocal(uid, data);
    } else { owned = new Set(); sealedOwned = new Set(); }
  } catch(e) {
    isOffline = true;
    const local = await loadLocal(uid);
    if (local) {
      if (activeSetId && local.sets && local.sets[activeSetId]) owned = new Set(local.sets[activeSetId]); else owned = new Set();
      if (local.avatar) userAvatar = local.avatar;
      if (local.sealed && activeSetId && local.sealed[activeSetId]) sealedOwned = new Set(local.sealed[activeSetId]); else sealedOwned = new Set();
    } else { owned = new Set(); sealedOwned = new Set(); }
  }
}

async function saveCollection(uid) {
  const indicator = document.getElementById("saving-indicator");
  indicator.style.display = "block";
  try {
    const snap2 = await getDoc(doc(db, "collections", uid));
    let existingData = snap2.exists() ? snap2.data() : {};
    let sets = existingData.sets || {};
    if (activeSetId) sets[activeSetId] = [...owned];
    let sealedAll = existingData.sealed || {};
    if (activeSetId) sealedAll[activeSetId] = [...sealedOwned];
    await setDoc(doc(db, "collections", uid), { sets, sealed: sealedAll, updatedAt: new Date().toISOString(), email: currentUser.email || "" });
    await saveLocal(uid, { sets, sealed: sealedAll, avatar: userAvatar });
  } catch(e) {
    try { const lc = await loadLocal(uid); let ls = (lc && lc.sets) ? lc.sets : {}; if (activeSetId) ls[activeSetId] = [...owned]; let sl2 = (lc && lc.sealed) ? lc.sealed : {}; if (activeSetId) sl2[activeSetId] = [...sealedOwned]; await saveLocal(uid, { sets: ls, sealed: sl2, avatar: userAvatar }); } catch(e2) {}
  }
  setTimeout(() => { indicator.style.display = "none"; }, 800);
}

function debouncedSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveCollection(currentUser.uid), 1200);
}

        currentView = "tracker";

        el.innerHTML = '<span style="color:var(--red)">Erreur de chargement</span>';
      }
    };
  });
}
  }

  const CARDS = activeSetCards;
  const totalCards = CARDS.length;
  const haveCount = CARDS.filter(c => owned.has(c.n)).length;
  const missingCount = totalCards - haveCount;
  const pct = totalCards > 0 ? Math.round((haveCount / totalCards) * 100) : 0;

  // Type stats
  const byType = {};
  CARDS.forEach(c => {
    if (!byType[c.type]) byType[c.type] = {total:0, have:0};
    byType[c.type].total++;
    if (owned.has(c.n)) byType[c.type].have++;
  });

  // Unique rarities in this set
  const setRarities = [...new Set(CARDS.map(c => c.rarity))];

  // Filter
  const filtered = CARDS.filter(c => {
    if (filterType !== "all" && c.type !== filterType) return false;
    if (filterRarity !== "all" && c.rarity !== filterRarity) return false;
    if (filterStatus === "owned" && !owned.has(c.n)) return false;
    if (filterStatus === "missing" && owned.has(c.n)) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      if (!c.name.toLowerCase().includes(q) && !String(c.n).includes(q)) return false;
    }
    return true;
  });

  const gradientFill = pct === 100 ? "linear-gradient(90deg,#4ade80,#22d3ee)" : "linear-gradient(90deg,#3b82f6,#8b5cf6,#ec4899)";

        </div>
        <div class="user-info">
          <button class="profile-btn" id="profile-btn">${renderProfileBtn()}</button>
        </div>
      </div>
      ${menuOpen ? renderMenu() : ''}
    </div>

    <div class="progress-section">
      <div class="progress-top">
        <span class="progress-pct">${pct}%</span>
        <span class="progress-count">${haveCount}/${totalCards} — <span style="color:var(--red)">${missingCount} manquantes</span></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${gradientFill}"></div></div>
    </div>

    <div class="type-chips">
      ${Object.entries(byType).map(([t, s]) => `
        <div class="type-chip ${filterType === t ? 'active' : ''}" data-type="${t}" style="${filterType === t ? `color:${RARITY_COLOR['Rare']};border-color:${RARITY_COLOR['Rare']}50` : ''}">
          <span style="font-size:10px">${TYPE_META[t]?.icon || ''}</span>
          <span class="chip-count">${s.have}/${s.total}</span>
        </div>
      `).join('')}
    </div>

    <div class="controls">
      <div class="filter-row">
        ${[{k:"missing",l:`Manquantes (${missingCount})`,c:"var(--red)"},{k:"owned",l:`Possédées (${haveCount})`,c:"var(--green)"},{k:"all",l:"Toutes",c:"var(--text2)"}].map(b => `
          <button class="filter-btn ${filterStatus === b.k ? 'active' : ''}" data-status="${b.k}" style="${filterStatus === b.k ? `color:${b.c};border-color:${b.c}` : ''}">${b.l}</button>
        `).join('')}
      </div>
      <input class="search-input" id="search-input" type="text" placeholder="🔍 Rechercher une carte..." value="${searchText}">
      <div class="rarity-row">
        <button class="rarity-btn ${filterRarity === 'all' ? 'active' : ''}" data-rarity="all" style="${filterRarity === 'all' ? 'color:#94a3b8;border-color:#94a3b8' : ''}">Toutes</button>
        ${setRarities.map(r => `
          <button class="rarity-btn ${filterRarity === r ? 'active' : ''}" data-rarity="${r}" style="${filterRarity === r ? `color:${getRarityColor(r)};border-color:${getRarityColor(r)}` : ''}">${getRarityShort(r)} ${r}</button>
        `).join('')}
      </div>
      <div class="results-info"><span>${filtered.length} carte${filtered.length > 1 ? 's' : ''}</span></div>
    </div>

    <div class="card-list" id="card-list">
      ${filtered.length === 0 ? `<div class="empty-state"><span class="empty-icon">${filterStatus === 'missing' ? '🎉' : '🔍'}</span>${filterStatus === 'missing' ? 'Tout est complet !' : 'Aucune carte trouvée'}</div>` :
        filtered.map(c => {
          const isOwned = owned.has(c.n);
          let extraClass = isOwned ? 'owned' : 'missing';
          if (c.isSecret && !isOwned) extraClass += ' secret';
          const thumbUrl = c.image ? c.image + "/low.webp" : "";
          return `<div class="card-row ${extraClass}" data-n="${c.n}">
            <div class="check ${isOwned ? 'checked' : ''}">${isOwned ? '✓' : ''}</div>
            ${thumbUrl ? `<img class="card-thumb" src="${thumbUrl}" loading="lazy" alt="" onerror="this.style.display='none'">` : ''}
            <span class="card-num">${c.n}</span>
            <span class="card-icon">${c.typeIcon}</span>
            <span class="card-name">${c.name}</span>
            <span class="card-rarity" style="color:${getRarityColor(c.rarity)}">${getRarityShort(c.rarity)}</span>
            <button class="eye-btn" data-preview="${c.n}" title="Aperçu">👁️</button>

    renderApp();
    document.getElementById("search-input").focus();

  document.querySelectorAll(".filter-btn").forEach(b => { b.onclick = () => { filterStatus = b.dataset.status; renderApp(); }; });
  document.querySelectorAll(".rarity-btn").forEach(b => { b.onclick = () => { filterRarity = filterRarity === b.dataset.rarity ? "all" : b.dataset.rarity; renderApp(); }; });
  document.querySelectorAll(".type-chip").forEach(b => { b.onclick = () => { filterType = filterType === b.dataset.type ? "all" : b.dataset.type; renderApp(); }; });

  document.querySelectorAll(".card-row").forEach(row => {

      if (owned.has(n)) owned.delete(n); else owned.add(n);
      debouncedSave();

    };
  });

  document.querySelectorAll(".eye-btn").forEach(btn => {
    btn.onclick = (e) => { e.stopPropagation(); showCardPreview(btn.dataset.preview); };
  });
}

    document.getElementById("pm-account")?.addEventListener("click", () => { menuOpen = false; currentView = "account"; renderApp(); });
    document.getElementById("pm-collections")?.addEventListener("click", () => { menuOpen = false; currentView = "collections"; renderApp(); });
    document.getElementById("pm-friends")?.addEventListener("click", () => { menuOpen = false; currentView = "friends"; renderApp(); });

}

// ==================== COLLECTIONS PAGE (DYNAMIC) ====================
async function renderCollectionsPage() {
  const appEl = document.getElementById("app-screen");

  // If series not loaded yet, show loading and fetch
  if (allSeries.length === 0) {
    appEl.innerHTML = `
      <div class="header"><div class="header-top"><div><div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt="" onerror="this.style.display='none'"><h1>PokéTracker</h1></div><div class="header-sub">Chargement des collections...</div></div>
      <div class="user-info"><button class="profile-btn" id="profile-btn">${renderProfileBtn()}</button></div></div>${menuOpen ? renderMenu() : ''}</div>
      <div class="account-page"><div class="empty-state"><div class="inline-spinner"></div> Chargement des séries depuis TCGdex...</div></div>`;
    bindMenuEvents();
    try {
      allSeries = await loadAllSeries();
      // Reverse so newest series first
      allSeries = allSeries.reverse();
    } catch(e) {
      appEl.innerHTML = `<div class="account-page" style="padding-top:80px"><div class="empty-state"><span class="empty-icon">❌</span>Erreur de chargement TCGdex<br><br><button class="auth-btn primary" style="max-width:200px;margin:0 auto" onclick="location.reload()">Réessayer</button></div></div>`;
      return;
    }
    renderCollectionsPage();
    return;
  }

  // Filter series by search
  const q = collectionsSearchText.toLowerCase();
  const filteredSeries = q ? allSeries.filter(s => s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q)) : allSeries;

  appEl.innerHTML = `
    <div class="header" style="position:relative"><div class="header-top"><div><div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt="" onerror="this.style.display='none'"><h1>PokéTracker</h1></div><div class="header-sub">Toutes les collections</div></div>
    <div class="user-info"><button class="profile-btn" id="profile-btn">${renderProfileBtn()}</button></div></div>${menuOpen ? renderMenu() : ''}</div>
    <div class="account-page">
      ${activeSetId ? '<button class="account-back" id="back-tracker">← Retour au tracker</button>' : ''}
      <input class="search-input" id="collections-search" type="text" placeholder="🔍 Rechercher une série ou un set..." value="${collectionsSearchText}" style="margin-bottom:16px">
      <div id="series-list">
        ${filteredSeries.map(s => {
          const isOpen = openSeries.has(s.id);
          const detail = seriesDetailsCache[s.id];
          const logoUrl = s.logo ? s.logo + "/low.webp" : "";
          return `
          <div class="series-block" data-series="${s.id}">
            <div class="series-header" data-toggle="${s.id}">
              ${logoUrl ? `<img class="series-logo" src="${logoUrl}" alt="" onerror="this.style.display='none'">` : '<div class="series-logo" style="display:flex;align-items:center;justify-content:center;font-size:20px">🎴</div>'}
              <div class="series-info">
                <div class="series-name">${s.name}</div>
                <div class="series-meta">${detail ? detail.sets?.length + ' sets' : 'Cliquer pour voir les sets'}</div>
              </div>
              <span class="series-arrow ${isOpen ? 'open' : ''}">▶</span>
            </div>
            <div class="series-sets ${isOpen ? 'open' : ''}" id="sets-${s.id}">
              ${isOpen && detail ? renderSetsList(detail) : (isOpen ? '<div style="padding:12px;color:var(--text3);font-size:12px"><div class="inline-spinner"></div> Chargement...</div>' : '')}
            </div>
          </div>`;
        }).join('')}
        ${filteredSeries.length === 0 ? '<div class="empty-state"><span class="empty-icon">🔍</span>Aucune série trouvée</div>' : ''}
      </div>
    </div>`;

  bindMenuEvents();

  // Back to tracker
  document.getElementById("back-tracker")?.addEventListener("click", () => { currentView = "tracker"; renderApp(); });

  // Search
  document.getElementById("collections-search").oninput = (e) => {
    collectionsSearchText = e.target.value;
    renderCollectionsPage();
    document.getElementById("collections-search")?.focus();
  };

  // Series toggles
  document.querySelectorAll("[data-toggle]").forEach(el => {
    el.onclick = async () => {
      const sid = el.dataset.toggle;
      if (openSeries.has(sid)) {
        openSeries.delete(sid);
        renderCollectionsPage();
      } else {
        openSeries.add(sid);
        if (!seriesDetailsCache[sid]) {
          renderCollectionsPage(); // Show loading state
          try {
            seriesDetailsCache[sid] = await loadSerieDetail(sid);
          } catch(e) {
            seriesDetailsCache[sid] = { sets: [] };
          }
        }
        renderCollectionsPage();
      }
      document.getElementById("collections-search")?.focus();
    };
  });

  // Set clicks
  document.querySelectorAll("[data-select-set]").forEach(el => {
    el.onclick = () => selectSet(el.dataset.selectSet);
  });
}

function renderSetsList(serieDetail) {
  if (!serieDetail || !serieDetail.sets || serieDetail.sets.length === 0) {
    return '<div style="padding:8px 12px;color:var(--text4);font-size:12px">Aucun set disponible</div>';
  }
  return serieDetail.sets.map(s => {
    const logoUrl = s.logo ? s.logo + "/low.webp" : "";
    const isActive = activeSetId === s.id;
    const cardCount = s.cardCount?.total || s.total || "?";
    return `
      <div class="set-item ${isActive ? 'active' : ''}" data-select-set="${s.id}">
        ${logoUrl ? `<img class="set-logo" src="${logoUrl}" alt="" onerror="this.style.display='none'">` : '<div class="set-logo" style="display:flex;align-items:center;justify-content:center;font-size:14px">📦</div>'}
        <span class="set-name">${s.name}</span>
        <span class="set-count">${cardCount}</span>
        ${isActive ? '<span class="set-badge">✓ Actif</span>' : ''}
      </div>`;
  }).join('');
}

async function selectSet(setId) {
  activeSetId = setId;
  filterType = "all"; filterStatus = "missing"; filterRarity = "all"; searchText = "";

  // Show loading
  const appEl = document.getElementById("app-screen");
  appEl.innerHTML = `<div class="header"><div class="header-top"><div><div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt="" onerror="this.style.display='none'"><h1>PokéTracker</h1></div><div class="header-sub">Chargement de ${setId}...</div></div></div></div>
    <div class="account-page"><div class="empty-state"><div class="inline-spinner"></div> Chargement des cartes...</div></div>`;

  try {
    activeSetData = await loadSetDetail(setId);
    activeSetCards = processSetCards(activeSetData);
  } catch(e) {
    appEl.innerHTML = `<div class="account-page" style="padding-top:80px"><div class="empty-state"><span class="empty-icon">❌</span>Erreur de chargement du set "${setId}"<br><br><button class="account-back" id="back-coll">← Retour aux collections</button></div></div>`;
    document.getElementById("back-coll")?.addEventListener("click", () => { currentView = "collections"; renderApp(); });
    return;
  }

  // Load user's collection for this set
  await loadCollection(currentUser.uid);
  currentView = "tracker";
  renderApp();
}

// ==================== CARD PREVIEW ====================
function showCardPreview(localId) {
  const card = activeSetCards.find(c => c.n === localId || c.n == localId);
  if (!card) return;
  const modal = document.getElementById("card-modal");
  modal.style.display = "block";

  const highUrl = card.image ? card.image + "/high.webp" : null;
  const highPng = card.image ? card.image + "/high.png" : null;

  modal.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <button class="modal-close" id="modal-close">✕</button>
        ${highUrl ? '' : '<div class="modal-loading">Image non disponible</div>'}
        <div class="modal-info">${card.n} — ${card.name}</div>
      </div>
    </div>`;

  if (highUrl) {
    const box = modal.querySelector(".modal-box");
    const info = modal.querySelector(".modal-info");
    const img = new Image();
    // Show loading first
    const loadDiv = document.createElement("div");
    loadDiv.className = "modal-loading";
    loadDiv.textContent = "⏳ Chargement...";
    box.insertBefore(loadDiv, info);

    img.onload = () => {
      loadDiv.remove();
      const imgEl = document.createElement("img");
      imgEl.src = img.src;
      imgEl.className = "modal-img";
      box.insertBefore(imgEl, info);
    };
    img.onerror = () => {
      // Try PNG fallback
      if (highPng) {
        const img2 = new Image();
        img2.onload = () => {
          loadDiv.remove();
          const imgEl = document.createElement("img");
          imgEl.src = img2.src;
          imgEl.className = "modal-img";
          box.insertBefore(imgEl, info);
        };
        img2.onerror = () => { loadDiv.textContent = "Image non disponible"; };
        img2.src = highPng;
      } else {
        loadDiv.textContent = "Image non disponible";
      }
    };
    img.src = highUrl;
  }

  document.getElementById("modal-close").onclick = closeModal;
  document.getElementById("modal-overlay").onclick = (e) => { if (e.target.id === "modal-overlay") closeModal(); };
}

function closeModal() {
  const modal = document.getElementById("card-modal");
  modal.style.display = "none";
  modal.innerHTML = "";
}
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  avatarGrid.querySelectorAll('.avatar-opt').forEach(el => {
    el.onclick = async () => {
      const pid = Number(el.dataset.pid); userAvatar = pid;
      avatarGrid.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('selected')); el.classList.add('selected');
      const msg = document.getElementById("msg-avatar");
      try { await setDoc(doc(db, "collections", currentUser.uid), { avatar: pid }, { merge: true }); await updateUserProfile(); msg.className = "account-msg success"; msg.textContent = "✓ Avatar mis à jour !"; setTimeout(() => { msg.textContent = ""; }, 2000); }
      catch(e) { msg.className = "account-msg error"; msg.textContent = e.message; }
    };
  });

  document.getElementById("save-name").onclick = async () => {
    const name = document.getElementById("input-name").value.trim();
    const msg = document.getElementById("msg-name");
    if (!name) { msg.className = "account-msg error"; msg.textContent = "Le pseudo ne peut pas être vide"; return; }
    try { await updateProfile(currentUser, { displayName: name }); await updateUserProfile(); msg.className = "account-msg success"; msg.textContent = "✓ Pseudo mis à jour !"; setTimeout(() => { msg.textContent = ""; }, 2000); }
    catch(e) { msg.className = "account-msg error"; msg.textContent = e.message; }
  };

  if (!isGoogle) {
    document.getElementById("save-pass").onclick = async () => {
      const oldPass = document.getElementById("input-old-pass").value;
      const newPass = document.getElementById("input-new-pass").value;
      const msg = document.getElementById("msg-pass");
      if (!oldPass || !newPass) { msg.className = "account-msg error"; msg.textContent = "Remplis les deux champs"; return; }
      if (newPass.length < 6) { msg.className = "account-msg error"; msg.textContent = "6 caractères minimum"; return; }
      try {
        const credential = EmailAuthProvider.credential(currentUser.email, oldPass);
        await reauthenticateWithCredential(currentUser, credential);
        await updatePassword(currentUser, newPass);
        msg.className = "account-msg success"; msg.textContent = "✓ Mot de passe mis à jour !";
        document.getElementById("input-old-pass").value = ""; document.getElementById("input-new-pass").value = "";
        setTimeout(() => { msg.textContent = ""; }, 2000);
      } catch(e) {
        const msgs = {"auth/wrong-password":"Mot de passe actuel incorrect","auth/invalid-credential":"Mot de passe actuel incorrect","auth/too-many-requests":"Trop de tentatives"};
        msg.className = "account-msg error"; msg.textContent = msgs[e.code] || e.message;
      }
    };
  }
}

// ==================== FRIENDS SYSTEM ====================
function generateFriendCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function ensureFriendCode() {
  if (!currentUser) return;
  try {
    const snap = await getDoc(doc(db, "users", currentUser.uid));
    if (snap.exists() && snap.data().friendCode) { myFriendCode = snap.data().friendCode; }
    else { myFriendCode = generateFriendCode(); await setDoc(doc(db, "users", currentUser.uid), { friendCode: myFriendCode, displayName: currentUser.displayName || "Dresseur", avatar: userAvatar, email: currentUser.email || "" }, { merge: true }); }
  } catch (e) {}
}

async function updateUserProfile() {
  if (!currentUser) return;
  try { await setDoc(doc(db, "users", currentUser.uid), { displayName: currentUser.displayName || "Dresseur", avatar: userAvatar, email: currentUser.email || "" }, { merge: true }); } catch (e) {}
}

async function loadFriends() {
  if (!currentUser) return;
  try {
    const q1 = query(collection(db, "friends"), where("users", "array-contains", currentUser.uid));
    const snap = await getDocs(q1);
    friendsList = [];
    for (const d of snap.docs) {
      const data = d.data(); const otherUid = data.users.find(u => u !== currentUser.uid);
      if (otherUid) { const uSnap = await getDoc(doc(db, "users", otherUid)); const uData = uSnap.exists() ? uSnap.data() : {}; friendsList.push({ docId: d.id, uid: otherUid, name: uData.displayName || "Dresseur", avatar: uData.avatar || null, code: uData.friendCode || "" }); }
    }
    const q2 = query(collection(db, "friendRequests"), where("to", "==", currentUser.uid), where("status", "==", "pending"));
    const snap2 = await getDocs(q2);
    friendRequests = [];
    for (const d of snap2.docs) {
      const data = d.data(); const uSnap = await getDoc(doc(db, "users", data.from)); const uData = uSnap.exists() ? uSnap.data() : {};
      friendRequests.push({ docId: d.id, fromUid: data.from, name: uData.displayName || "Dresseur", avatar: uData.avatar || null, code: uData.friendCode || "" });
    }
  } catch (e) {}
}

async function sendFriendRequest(code) {
  if (!currentUser) return "Non connecté";
  code = code.trim().toUpperCase();
  if (code === myFriendCode) return "C'est votre propre code !";
  if (code.length < 4) return "Code invalide";
  try {
    const q = query(collection(db, "users"), where("friendCode", "==", code));
    const snap = await getDocs(q);
    if (snap.empty) return "Aucun dresseur avec ce code";
    const targetUid = snap.docs[0].id;
    const q2 = query(collection(db, "friends"), where("users", "array-contains", currentUser.uid));
    const fSnap = await getDocs(q2);
    for (const d of fSnap.docs) { if (d.data().users.includes(targetUid)) return "Déjà amis !"; }
    const q3 = query(collection(db, "friendRequests"), where("from", "==", currentUser.uid), where("to", "==", targetUid), where("status", "==", "pending"));
    const rSnap = await getDocs(q3);
    if (!rSnap.empty) return "Demande déjà envoyée !";
    await addDoc(collection(db, "friendRequests"), { from: currentUser.uid, to: targetUid, status: "pending", createdAt: new Date().toISOString() });
    return "ok";
  } catch (e) { return "Erreur: " + e.message; }
}

async function acceptFriendRequest(reqDocId, fromUid) {
  await addDoc(collection(db, "friends"), { users: [currentUser.uid, fromUid], createdAt: new Date().toISOString() });
  await deleteDoc(doc(db, "friendRequests", reqDocId));
  await loadFriends();
}

async function rejectFriendRequest(reqDocId) {
  await deleteDoc(doc(db, "friendRequests", reqDocId));
  await loadFriends();
}

function renderFriendsPage() {
  document.getElementById("app-screen").innerHTML = `
    <div class="header"><div class="header-top"><div><div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt="" onerror="this.style.display='none'"><h1>PokéTracker</h1></div><div class="header-sub">Amis</div></div></div></div>
    <div class="account-page">
      <button class="account-back" id="back-btn">← Retour</button>
      <div class="friend-code-box">
        <div class="friend-code-label">Mon code ami</div>
        <div class="friend-code-display">${myFriendCode}</div>
        <button class="friend-btn primary" id="copy-code" style="margin-top:6px">Copier</button>
      </div>
      <div class="friend-add-row">
        <input type="text" id="add-friend-input" placeholder="Code ami..." maxlength="6">
        <button class="friend-btn primary" id="add-friend-btn">Ajouter</button>
      </div>
      <div class="account-msg" id="msg-friend"></div>
      ${friendRequests.length > 0 ? `
        <div class="friend-section-title">📨 Demandes reçues <span style="background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:50%;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px">${friendRequests.length}</span></div>
        ${friendRequests.map(r => `
          <div class="friend-card">
            <div class="friend-avatar">${r.avatar ? '<img src="'+getAvatarUrl(r.avatar)+'">' : '<span style="font-size:18px">👤</span>'}</div>
            <div class="friend-info"><div class="friend-name">${r.name}</div><div class="friend-code-small">#${r.code}</div></div>
            <button class="friend-btn accept" data-accept="${r.docId}" data-from="${r.fromUid}">Accepter</button>
            <button class="friend-btn reject" data-reject="${r.docId}">Refuser</button>
          </div>`).join('')}` : ''}
      <div class="friend-section-title">👥 Mes amis (${friendsList.length})</div>
      ${friendsList.length === 0 ? '<div class="friend-empty">Aucun ami pour le moment.<br>Partagez votre code pour commencer !</div>' :
        friendsList.map(f => `
          <div class="friend-card">
            <div class="friend-avatar">${f.avatar ? '<img src="'+getAvatarUrl(f.avatar)+'">' : '<span style="font-size:18px">👤</span>'}</div>
            <div class="friend-info"><div class="friend-name">${f.name}</div><div class="friend-code-small">#${f.code}</div></div>
            <button class="friend-btn view" data-view-uid="${f.uid}" data-view-name="${f.name}" data-view-avatar="${f.avatar || ''}">Voir</button>
          </div>`).join('')}
    </div>`;

  document.getElementById("back-btn").onclick = () => { currentView = activeSetId ? "tracker" : "collections"; renderApp(); };
  document.getElementById("copy-code").onclick = () => {
    navigator.clipboard.writeText(myFriendCode).then(() => { const btn = document.getElementById("copy-code"); btn.textContent = "Copié !"; setTimeout(() => { btn.textContent = "Copier"; }, 1500); });
  };
  document.getElementById("add-friend-btn").onclick = async () => {
    const input = document.getElementById("add-friend-input");
    const msg = document.getElementById("msg-friend");
    const result = await sendFriendRequest(input.value);
    if (result === "ok") { msg.style.color = "#4ade80"; msg.textContent = "Demande envoyée !"; input.value = ""; }
    else { msg.style.color = "#f59e0b"; msg.textContent = result; }
    setTimeout(() => { msg.textContent = ""; }, 3000);
  };
  document.querySelectorAll("[data-accept]").forEach(btn => {
    btn.onclick = async () => { await acceptFriendRequest(btn.dataset.accept, btn.dataset.from); renderFriendsPage(); };
  });
  document.querySelectorAll("[data-reject]").forEach(btn => {
    btn.onclick = async () => { await rejectFriendRequest(btn.dataset.reject); renderFriendsPage(); };
  });
  document.querySelectorAll("[data-view-uid]").forEach(btn => {
    btn.onclick = () => {
      viewingFriend = { uid: btn.dataset.viewUid, name: btn.dataset.viewName, avatar: btn.dataset.viewAvatar };
      currentView = "friend-collection";
      renderApp();
    };
  });
}

// ==================== FRIEND COLLECTION VIEW ====================
let friendViewSetId = null;
let friendData_cache = {};

async function renderFriendCollectionPage() {
  if (!viewingFriend) { currentView = "friends"; renderApp(); return; }
  if (!friendData_cache[viewingFriend.uid]) {
    try { const snap = await getDoc(doc(db, "collections", viewingFriend.uid)); friendData_cache[viewingFriend.uid] = snap.exists() ? snap.data() : {}; }
    catch (e) { friendData_cache[viewingFriend.uid] = {}; }
  }
  const friendData = friendData_cache[viewingFriend.uid];
  const friendSets = friendData.sets || {};

  if (friendViewSetId) {
    // Detail view — load from API
    let setData;
    try { setData = await loadSetDetail(friendViewSetId); } catch(e) { setData = null; }
    if (!setData || !setData.cards) {
      document.getElementById("app-screen").innerHTML = `<div class="account-page" style="padding-top:80px"><div class="empty-state">❌ Impossible de charger ce set</div><button class="account-back" id="back-btn">← Retour</button></div>`;
      document.getElementById("back-btn").onclick = () => { friendViewSetId = null; renderFriendCollectionPage(); };
      return;
    }
    const cards = processSetCards(setData);
    const fOwned = new Set(friendSets[friendViewSetId] || []);
    const total = cards.length;
    const have = cards.filter(c => fOwned.has(c.n)).length;
    const pct = total > 0 ? Math.round(have / total * 100) : 0;
    const gradientFill = pct === 100 ? "linear-gradient(90deg,#4ade80,#22d3ee)" : "linear-gradient(90deg,#3b82f6,#8b5cf6,#ec4899)";
    const setLogo = setData.logo ? setData.logo + "/low.webp" : "";

    document.getElementById("app-screen").innerHTML = `
      <div class="header"><div class="header-top"><div><div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt="" onerror="this.style.display='none'"><h1>PokéTracker</h1></div>
      <div class="header-sub">${setLogo ? `<img src="${setLogo}" style="height:16px;vertical-align:middle;margin-right:4px" onerror="this.style.display='none'">` : ''}${viewingFriend.name} • ${setData.name}</div></div></div></div>
      <div class="progress-section">
        <div class="progress-top"><span class="progress-pct">${pct}%</span><span class="progress-count">${have}/${total}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${gradientFill}"></div></div>
      </div>
      <div class="account-page" style="padding-top:0"><button class="account-back" id="back-btn">← Retour</button></div>
      <div class="card-list">
        ${cards.map(c => {
          const isOwned = fOwned.has(c.n);
          return `<div class="card-row ${isOwned ? 'owned' : 'missing'}" style="pointer-events:none">
            <div class="check ${isOwned ? 'checked' : ''}">${isOwned ? '✓' : ''}</div>
            <span class="card-num">${c.n}</span>
            <span class="card-icon">${c.typeIcon}</span>
            <span class="card-name">${c.name}</span>
            <span class="card-rarity" style="color:${getRarityColor(c.rarity)}">${getRarityShort(c.rarity)}</span>
          </div>`;
        }).join('')}
      </div>`;
    document.getElementById("back-btn").onclick = () => { friendViewSetId = null; renderFriendCollectionPage(); };
  } else {
    // Show which sets the friend has data for
    const setIds = Object.keys(friendSets).filter(k => friendSets[k] && friendSets[k].length > 0);
    document.getElementById("app-screen").innerHTML = `
      <div class="header"><div class="header-top"><div><div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt="" onerror="this.style.display='none'"><h1>PokéTracker</h1></div><div class="header-sub">Collection de ${viewingFriend.name}</div></div></div></div>
      <div class="account-page">
        <button class="account-back" id="back-btn">← Retour aux amis</button>
        ${setIds.length === 0 ? '<div class="empty-state">Ce dresseur n\'a encore aucune collection</div>' :
          setIds.map(sid => {
            const count = friendSets[sid].length;
            return `<div class="friend-set-card" data-friend-set="${sid}" style="cursor:pointer">
              <div style="display:flex;align-items:center;gap:10px">
                <div style="font-size:20px">📦</div>
                <div style="flex:1"><div style="font-weight:700;font-size:14px;color:var(--text)">${sid}</div>
                <div style="font-size:12px;color:var(--text3)">${count} cartes collectées</div></div>
              </div>
            </div>`;
          }).join('')}
      </div>`;
    document.getElementById("back-btn").onclick = () => { friendViewSetId = null; friendData_cache = {}; currentView = "friends"; renderApp(); };
    document.querySelectorAll("[data-friend-set]").forEach(el => {
      el.onclick = () => { friendViewSetId = el.dataset.friendSet; renderFriendCollectionPage(); };
    });
  }
}

// ==================== AUTH STATE ====================
onAuthStateChanged(auth, async (user) => {
  document.getElementById("loading-screen").style.display = "none";
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    await ensureFriendCode();
    await loadFriends();
    // If we have an active set, load its collection
    if (activeSetId) {
      await loadCollection(user.uid);
      currentView = "tracker";
    } else {
      currentView = "collections";
    }
    renderApp();
  } else {
    currentUser = null;
    owned = new Set();
    sealedOwned = new Set();
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
    renderAuth();
  }
});
