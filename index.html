<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PokéTracker — Collections Pokémon TCG</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PokéTracker">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--bg2:#141424;--card:#1a1a2e;--card2:#1e1e35;--border:rgba(255,255,255,0.07);--text:#f0f0f5;--text2:#a0a0b8;--text3:#5a5a78;--text4:#3a3a50;--pokered:#e3350d;--pokered-soft:rgba(227,53,13,0.15);--pokeyellow:#ffcb05;--pokeyellow-soft:rgba(255,203,5,0.12);--pokeblue:#3b4cca;--pokeblue-soft:rgba(59,76,202,0.15);--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;--pink:#f472b6;--gold:#ffd700;--sar-pink:#ff6eb4;--ma-orange:#ff4500;--ur-blue:#00bfff;--ir-purple:#da70d6}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(227,53,13,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(59,76,202,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text4);border-radius:3px}
input,button{font-family:'Outfit',sans-serif}
button{cursor:pointer}

/* Auth Screen */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1}
.auth-box{background:var(–card);border:1px solid var(–border);border-radius:20px;padding:32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(227,53,13,0.05)}
.auth-box h1{font-size:24px;font-weight:900;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,var(–pokeyellow),#ffa726);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-box .subtitle{text-align:center;color:var(–text2);font-size:13px;margin-bottom:24px}
.auth-input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#ffffff;font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s;-webkit-text-fill-color:#ffffff}
.auth-input::placeholder{color:#7a7a98;-webkit-text-fill-color:#7a7a98}
.auth-input:focus{border-color:var(–pokered);background:rgba(227,53,13,0.04)}
.auth-btn{width:100%;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:700;transition:all .2s;margin-bottom:8px}
.auth-btn.primary{background:linear-gradient(135deg,var(–pokered),#c62828);color:#fff;box-shadow:0 4px 16px rgba(227,53,13,0.3)}
.auth-btn.primary:hover{transform:translateY(-1px);filter:brightness(1.1);box-shadow:0 6px 24px rgba(227,53,13,0.4)}
.auth-btn.google{background:rgba(255,255,255,0.06);color:var(–text);border:1px solid var(–border)}
.auth-btn.google:hover{background:rgba(255,255,255,0.1)}
.auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:var(–text3)}
.auth-toggle span{color:var(–pokeyellow);cursor:pointer;font-weight:600}
.auth-toggle span:hover{text-decoration:underline}
.auth-forgot{text-align:center;margin-top:8px;color:#7a7a98;font-size:13px;cursor:pointer;transition:color .2s}
.auth-forgot:hover{color:#ffffff}
.auth-error{color:var(–red);font-size:12px;text-align:center;margin-bottom:10px;min-height:16px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(–text3);font-size:12px}
.auth-divider::before,.auth-divider::after{content:’’;flex:1;height:1px;background:var(–border)}

/* App */
#app-screen{display:none;position:relative;z-index:1}
.header{background:linear-gradient(135deg,#1a0a0a 0%,#1a1a2e 40%,#0a1628 100%);border-bottom:2px solid var(–pokered);padding:16px 20px 16px;position:relative;overflow:hidden}
.header::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(–pokered),var(–pokeyellow),var(–pokered))}
.header-top{display:flex;align-items:center;justify-content:space-between;max-width:800px;margin:0 auto;position:relative;z-index:2}
.header-title{display:flex;align-items:center;gap:10px}
.header-title h1{font-size:20px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(–pokeyellow),#ffa726);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:12px;color:var(–text3);margin-left:38px;margin-top:2px}
.user-info{display:flex;align-items:center;gap:8px}
.profile-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(227,53,13,0.4);background:linear-gradient(135deg,var(–pokered),#c62828);color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;overflow:hidden;padding:0;box-shadow:0 2px 12px rgba(227,53,13,0.3)}
.profile-btn:hover{transform:scale(1.08);border-color:rgba(227,53,13,0.6);box-shadow:0 4px 20px rgba(227,53,13,0.4)}
.profile-menu{position:absolute;top:60px;right:20px;background:var(–card);border:1px solid rgba(227,53,13,0.15);border-radius:16px;width:260px;z-index:150;box-shadow:0 16px 48px rgba(0,0,0,0.6),0 0 30px rgba(227,53,13,0.05);overflow:hidden;animation:menuSlide .2s}
@keyframes menuSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.pm-header{padding:16px;border-bottom:1px solid var(–border);background:linear-gradient(135deg,rgba(227,53,13,0.06),transparent)}
.pm-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(–pokered),#c62828);color:#fff;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:8px;overflow:hidden;padding:0;box-shadow:0 2px 8px rgba(227,53,13,0.3)}
.pm-name{font-size:14px;font-weight:700;color:var(–text);margin-bottom:2px}
.pm-email{font-size:11px;color:var(–text3);word-break:break-all}
.pm-item{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13px;font-weight:600;color:var(–text2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:‘Outfit’,sans-serif}
.pm-item:hover{background:var(–pokered-soft);color:var(–text)}
.pm-item .pm-icon{font-size:16px;width:20px;text-align:center}
.pm-item.danger{color:var(–red)}
.pm-item.danger:hover{background:rgba(248,113,113,0.08)}
.pm-sep{height:1px;background:var(–border);margin:0}
.pm-overlay{position:fixed;inset:0;z-index:140}

/* Account page */
.account-page{max-width:500px;margin:0 auto;padding:20px}
.account-back{display:flex;align-items:center;gap:6px;color:var(–pokeyellow);font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;margin-bottom:20px;font-family:‘Outfit’,sans-serif;padding:6px 0}
.account-back:hover{color:#fff;text-shadow:0 0 12px rgba(255,203,5,0.4)}
.account-section{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:20px;margin-bottom:16px}
.account-section h3{font-size:15px;font-weight:700;color:var(–text);margin-bottom:14px}
.account-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.account-row:last-child{margin-bottom:0}
.account-label{font-size:12px;color:var(–text3);font-weight:600;margin-bottom:4px}
.account-value{font-size:14px;color:var(–text);font-weight:500}
.account-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:13px;outline:none;margin-bottom:8px;font-family:‘Outfit’,sans-serif;-webkit-text-fill-color:#fff}
.account-input::placeholder{color:#5a5a78;-webkit-text-fill-color:#5a5a78}
.account-input:focus{border-color:var(–pokered)}
.account-save{padding:8px 20px;border-radius:10px;border:none;font-size:12px;font-weight:700;background:linear-gradient(135deg,var(–pokered),#c62828);color:#fff;transition:all .2s;font-family:‘Outfit’,sans-serif;box-shadow:0 2px 12px rgba(227,53,13,0.3)}
.account-save:hover{filter:brightness(1.1);transform:translateY(-1px)}
.account-save:disabled{opacity:.5;cursor:not-allowed;transform:none}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:8px 0}
.avatar-opt{width:100%;aspect-ratio:1;border-radius:12px;border:2px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:4px}
.avatar-opt:hover{border-color:rgba(227,53,13,0.3);transform:scale(1.08)}
.avatar-opt.selected{border-color:var(–pokered);background:var(–pokered-soft);box-shadow:0 0 16px rgba(227,53,13,0.25)}
.avatar-opt img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}

/* Sealed */
.sealed-section{margin-top:16px;padding-top:12px;border-top:1px solid var(–border)}
.sealed-title{font-size:14px;font-weight:700;color:var(–text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sealed-count{font-size:12px;font-weight:500;color:var(–text3)}
.sealed-row{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:3px;border-radius:10px;cursor:pointer;transition:all .15s;user-select:none;border:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02)}
.sealed-row:hover{transform:translateX(4px)}
.sealed-row.owned{background:rgba(74,222,128,0.10);border-color:rgba(74,222,128,0.25)}
.sealed-row .sealed-icon{width:32px;height:32px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,0.04);padding:2px}
.sealed-row .sealed-name{flex:1;font-size:13px;font-weight:500;color:var(–text)}
.sealed-row.owned .sealed-name{color:var(–text2);text-decoration:line-through;text-decoration-color:rgba(74,222,128,0.4)}
.sealed-check{font-size:16px}

/* Friends */
.friend-card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.friend-card:hover{border-color:rgba(227,53,13,0.2)}
.friend-avatar{width:40px;height:40px;border-radius:50%;background:rgba(227,53,13,0.1);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:2px solid rgba(227,53,13,0.2)}
.friend-avatar img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:14px;font-weight:600;color:var(–text)}
.friend-code-small{font-size:11px;color:var(–text3);font-family:‘JetBrains Mono’,monospace}
.friend-btn{padding:6px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.friend-btn.primary{background:linear-gradient(135deg,var(–pokered),#c62828);color:white;box-shadow:0 2px 8px rgba(227,53,13,0.25)}
.friend-btn.accept{background:linear-gradient(135deg,#4ade80,#22c55e);color:#000}
.friend-btn.reject{background:rgba(248,113,113,0.15);color:#f87171;margin-left:4px}
.friend-btn.view{background:var(–pokeblue-soft);color:#60a5fa}
.friend-code-box{background:linear-gradient(135deg,rgba(227,53,13,0.06),rgba(59,76,202,0.06));border:2px dashed rgba(255,203,5,0.2);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px}
.friend-code-display{font-size:30px;font-weight:900;letter-spacing:5px;color:var(–pokeyellow);font-family:‘JetBrains Mono’,monospace;margin:8px 0;text-shadow:0 0 20px rgba(255,203,5,0.3)}
.friend-code-label{font-size:12px;color:var(–text3);font-weight:600}
.friend-add-row{display:flex;gap:8px;margin-bottom:16px}
.friend-add-row input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(–border);background:rgba(255,255,255,0.05);color:white;font-size:14px;font-family:‘JetBrains Mono’,monospace;text-transform:uppercase;letter-spacing:2px}
.friend-add-row input:focus{border-color:var(–pokered);outline:none}
.friend-section-title{font-size:13px;font-weight:700;color:var(–text2);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.friend-empty{text-align:center;color:var(–text3);font-size:13px;padding:20px}
.friend-set-card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:14px;margin-bottom:10px;transition:all .2s}
.friend-set-card:hover{border-color:rgba(227,53,13,0.2);transform:translateY(-1px)}
.account-msg{font-size:12px;margin-top:8px;min-height:16px}
.account-msg.success{color:var(–green)}
.account-msg.error{color:var(–red)}

/* Collection picker */
.collection-grid{display:grid;grid-template-columns:1fr;gap:10px}
.collection-card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
.collection-card:hover{transform:translateY(-2px);border-color:rgba(227,53,13,0.2)}
.collection-card.active{border-color:var(–pokered);background:var(–pokered-soft);box-shadow:0 0 20px rgba(227,53,13,0.1)}
.collection-card .cc-icon{font-size:28px}
.collection-card .cc-logo{width:56px;height:56px;object-fit:contain;border-radius:10px;background:rgba(255,255,255,0.04);padding:4px;flex-shrink:0}
.collection-card .cc-info{flex:1}
.collection-card .cc-name{font-size:14px;font-weight:700;color:var(–text);margin-bottom:2px}
.collection-card .cc-sub{font-size:11px;color:var(–text3)}
.collection-card .cc-badge{font-size:11px;font-weight:700;color:var(–pokeyellow);background:var(–pokeyellow-soft);padding:3px 8px;border-radius:6px}
.collection-card .cc-badge.soon{color:var(–text4);background:rgba(255,255,255,0.04)}

/* Progress */
.progress-section{max-width:800px;margin:0 auto;padding:16px 20px 8px}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-pct{font-size:32px;font-weight:900;font-family:‘JetBrains Mono’,monospace;background:linear-gradient(135deg,var(–pokeyellow),#ffa726);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.progress-count{font-size:13px;color:var(–text2);font-family:‘JetBrains Mono’,monospace}
.progress-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.type-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;max-width:800px;margin-left:auto;margin-right:auto;padding:0 20px}
.type-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:16px;font-size:11px;font-weight:600;border:1px solid transparent;transition:all .15s;cursor:pointer;background:rgba(255,255,255,0.04);color:var(–text3)}
.type-chip:hover{transform:scale(1.05);filter:brightness(1.2)}
.type-chip.active{background:rgba(255,255,255,0.08)}
.type-chip .chip-count{font-family:‘JetBrains Mono’,monospace;font-size:10px}

/* Controls */
.controls{max-width:800px;margin:0 auto;padding:12px 20px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:7px 14px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid var(–border);background:rgba(255,255,255,0.03);color:var(–text3);transition:all .2s}
.filter-btn:hover{transform:translateY(-1px)}
.filter-btn.active{border-color:currentColor;background:rgba(255,255,255,0.06)}
.search-input{width:100%;padding:10px 16px;border-radius:12px;border:1px solid var(–border);background:rgba(255,255,255,0.05);color:#ffffff;font-size:14px;outline:none;margin-bottom:8px;-webkit-text-fill-color:#ffffff;transition:all .2s}
.search-input::placeholder{color:#7a7a98;-webkit-text-fill-color:#7a7a98}
.search-input:focus{border-color:var(–pokered);background:rgba(227,53,13,0.04)}
.rarity-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.rarity-btn{padding:3px 9px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid var(–border);background:rgba(255,255,255,0.03);color:var(–text3);transition:all .15s}
.rarity-btn.active{border-color:currentColor;background:rgba(255,255,255,0.06)}
.results-info{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(–text3);margin-bottom:4px}

/* Card list */
.card-list{max-width:800px;margin:0 auto;padding:0 20px 100px}
.card-row{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:3px;border-radius:10px;cursor:pointer;transition:all .15s;user-select:none;border:1px solid transparent}
.card-row:hover{transform:translateX(4px)}
.card-row:active{transform:scale(.99)}
.card-row.owned{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.2)}
.card-row.missing{background:rgba(227,53,13,0.05);border-color:rgba(227,53,13,0.1)}
.card-row.secret{border-color:rgba(218,112,214,0.2)}
.card-row.secret.sar{border-color:rgba(255,110,180,0.25)}
.card-row.secret.gold{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.06)}
.card-row.secret.ma{border-color:rgba(255,69,0,0.25)}
.check{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(–text4);transition:all .15s;font-size:12px;font-weight:900;color:var(–bg)}
.check.checked{background:var(–green);border:none;box-shadow:0 0 8px rgba(74,222,128,0.3)}
.card-num{font-family:‘JetBrains Mono’,monospace;font-size:11px;font-weight:600;color:var(–text3);width:30px;flex-shrink:0;text-align:right}
.card-thumb{width:32px;height:44px;border-radius:4px;object-fit:cover;background:rgba(255,255,255,0.04);flex-shrink:0}
.card-thumb.no-img{display:flex;align-items:center;justify-content:center;font-size:14px;color:var(–text4)}
.card-icon{font-size:13px;flex-shrink:0}
.card-name{flex:1;font-size:13px;font-weight:500;color:var(–text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-row.owned .card-name{color:var(–text2);font-weight:400;text-decoration:line-through;text-decoration-color:rgba(74,222,128,0.4)}
.card-rarity{font-size:11px;font-weight:700;font-family:‘JetBrains Mono’,monospace;flex-shrink:0}
.empty-state{text-align:center;padding:60px 20px;color:var(–text4);font-size:15px;font-weight:500}
.empty-icon{font-size:36px;display:block;margin-bottom:10px}
.eye-btn{width:28px;height:28px;border-radius:6px;border:none;background:rgba(255,255,255,0.05);color:var(–text3);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0}
.eye-btn:hover{background:var(–pokered-soft);color:var(–pokered)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal-box{position:relative;max-width:360px;width:100%;text-align:center}
.modal-close{position:absolute;top:-40px;right:0;background:rgba(227,53,13,0.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:201}
.modal-close:hover{background:rgba(227,53,13,0.4)}
.modal-img{width:100%;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 30px rgba(227,53,13,0.1)}
.modal-info{margin-top:12px;color:var(–text2);font-size:13px;font-weight:600}
.modal-loading{color:var(–text3);font-size:14px;padding:40px}
.modal-error{color:var(–text3);font-size:13px;padding:20px}
.modal-error a{color:var(–pokeyellow);text-decoration:underline}

/* Saving indicator */
.saving{position:fixed;top:12px;right:12px;background:rgba(227,53,13,0.15);color:var(–pokered);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid rgba(227,53,13,0.3);z-index:100;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* Loading */

function renderAuth() {
  let isLogin = true;
  const el = document.getElementById("auth-screen");
  
  function draw() {
    el.innerHTML = `
      <div class="auth-box">
        <div style="text-align:center;margin-bottom:8px"><img src="logo.png" style="width:80px;height:80px;border-radius:18px" alt="PokéTracker"></div>
        <h1>PokéTracker</h1>
        <p class="subtitle">Gérez vos collections Pokémon TCG</p>
        <div id="auth-error" class="auth-error"></div>
        <input class="auth-input" id="auth-email" type="email" placeholder="Email" autocomplete="email">
        <input class="auth-input" id="auth-pass" type="password" placeholder="Mot de passe" autocomplete="${isLogin ? 'current-password' : 'new-password'}">
        <button class="auth-btn primary" id="auth-submit">${isLogin ? 'Se connecter' : 'Créer un compte'}</button>
        ${isLogin ? '<div class="auth-forgot" id="auth-forgot">Mot de passe oublié ?</div>' : ''}
        <div class="auth-divider">ou</div>
        <button class="auth-btn google" id="auth-google">🔵 Continuer avec Google</button>
        <div class="auth-toggle">${isLogin ? "Pas de compte ?" : "Déjà un compte ?"} <span id="auth-switch">${isLogin ? "S'inscrire" : "Se connecter"}</span></div>
      </div>`;
    
    document.getElementById("auth-switch").onclick = () => { isLogin = !isLogin; draw(); };
    if (isLogin) {
      document.getElementById("auth-forgot").onclick = async () => {
        const email = document.getElementById("auth-email").value.trim();
        const errEl = document.getElementById("auth-error");
        if (!email) { errEl.style.color = '#f59e0b'; errEl.textContent = "Entre ton email d'abord"; return; }
        try {
          await sendPasswordResetEmail(auth, email);
          errEl.style.color = '#4ade80'; errEl.textContent = "Email de réinitialisation envoyé !";
        } catch(e) {
          const msgs = {"auth/invalid-email":"Email invalide","auth/user-not-found":"Aucun compte avec cet email","auth/too-many-requests":"Trop de tentatives, réessaie plus tard"};
          errEl.style.color = ''; errEl.textContent = msgs[e.code] || e.message;
        }
      };
    }
    document.getElementById("auth-submit").onclick = async () => {
      const email = document.getElementById("auth-email").value.trim();
      const pass = document.getElementById("auth-pass").value;
      const errEl = document.getElementById("auth-error");
      if (!email || !pass) { errEl.textContent = "Remplis tous les champs"; return; }
      if (!isLogin && pass.length < 6) { errEl.textContent = "6 caractères minimum"; return; }
      try {
        errEl.textContent = "";
        if (isLogin) await signInWithEmailAndPassword(auth, email, pass);
        else await createUserWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        const msgs = {"auth/invalid-credential":"Email ou mot de passe incorrect","auth/email-already-in-use":"Cet email est déjà utilisé","auth/weak-password":"Mot de passe trop faible","auth/invalid-email":"Email invalide","auth/too-many-requests":"Trop de tentatives, réessaie plus tard"};
        errEl.textContent = msgs[e.code] || e.message;
      }
    };
    document.getElementById("auth-google").onclick = async () => {
      try { await signInWithPopup(auth, googleProvider); }
      catch (e) { document.getElementById("auth-error").textContent = e.message; }
    };
    // Enter key
    el.querySelectorAll(".auth-input").forEach(inp => {
      inp.onkeydown = (e) => { if (e.key === "Enter") document.getElementById("auth-submit").click(); };
    });
  }
  draw();
}

// OFFLINE (IndexedDB + SW)
const IDB_NAME='poketracker-offline',IDB_STORE='collections';
function openIDB(){return new Promise((r,j)=>{const q=indexedDB.open(IDB_NAME,1);q.onupgradeneeded=()=>q.result.createObjectStore(IDB_STORE);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function saveLocal(u,d){try{const b=await openIDB(),t=b.transaction(IDB_STORE,'readwrite');t.objectStore(IDB_STORE).put(d,u);await new Promise((r,j)=>{t.oncomplete=r;t.onerror=j})}catch(e){}}
async function loadLocal(u){try{const b=await openIDB(),t=b.transaction(IDB_STORE,'readonly'),q=t.objectStore(IDB_STORE).get(u);return new Promise((r,j)=>{q.onsuccess=()=>r(q.result||null);q.onerror=j})}catch(e){return null}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
let isOffline=false;

// Auto-sync when coming back online
window.addEventListener('online', async () => {
  if (!currentUser) return;
  const uid = currentUser.uid;
  const local = await loadLocal(uid);
  if (!local || !local.sets) return;
  try {
    const snap = await getDoc(doc(db, "collections", uid));
    let remote = snap.exists() ? snap.data() : {};
    let remoteSets = remote.sets || {};
    // Merge: local wins for sets modified offline
    let merged = { ...remoteSets, ...local.sets };
    await setDoc(doc(db, "collections", uid), {
      sets: merged,
      avatar: local.avatar || remote.avatar || null,
      updatedAt: new Date().toISOString(),
      email: currentUser.email || ""
    });
    await saveLocal(uid, { sets: merged, avatar: local.avatar || remote.avatar });
    isOffline = false;
    console.log("Synced offline changes to Firestore");
  } catch(e) { console.warn("Sync failed:", e); }
});

async function loadCollection(uid) {
  try {
    const snap = await getDoc(doc(db, "collections", uid));
    if (snap.exists()) {
      const data = snap.data();
      if (data.sets && data.sets[activeSet]) {
        owned = new Set(data.sets[activeSet]);
      } else if (data.cards && activeSet === "me25") {
        owned = new Set(data.cards);
      } else {
        owned = new Set();
      }
      if (data.avatar) userAvatar = data.avatar;
      if (data.sealed && data.sealed[activeSet]) sealedOwned = new Set(data.sealed[activeSet]); else sealedOwned = new Set();
      isOffline=false; await saveLocal(uid,data);
    } else { owned=new Set(); }
  } catch(e) {
    console.warn("Offline mode"); isOffline=true;
    const local=await loadLocal(uid);
    if(local){if(local.sets&&local.sets[activeSet])owned=new Set(local.sets[activeSet]);else if(local.cards&&activeSet==="me25")owned=new Set(local.cards);else owned=new Set();if(local.avatar)userAvatar=local.avatar;if(local.sealed&&local.sealed[activeSet])sealedOwned=new Set(local.sealed[activeSet]);else sealedOwned=new Set();}else{owned=new Set();}
  }
}

async function saveCollection(uid) {
  const indicator = document.getElementById("saving-indicator");
  indicator.style.display = "block";
  try {
    const snap2 = await getDoc(doc(db, "collections", uid));
    let existingData = snap2.exists() ? snap2.data() : {};
    let sets = existingData.sets || {};
    if (existingData.cards && !sets.me25) sets.me25 = existingData.cards;
    sets[activeSet] = [...owned];
    let sealedAll = existingData.sealed || {};
    sealedAll[activeSet] = [...sealedOwned];
    await setDoc(doc(db, "collections", uid), {
      sets: sets,
      sealed: sealedAll,
      updatedAt: new Date().toISOString(),
      email: currentUser.email || ""
    });
    await saveLocal(uid,{sets,sealed:sealedAll,avatar:userAvatar});
  } catch(e) {
    console.error("Save err:",e);try{const lc=await loadLocal(uid);let ls=(lc&&lc.sets)?lc.sets:{};ls[activeSet]=[...owned];let sl2=(lc&&lc.sealed)?lc.sealed:{};sl2[activeSet]=[...sealedOwned];await saveLocal(uid,{sets:ls,sealed:sl2,avatar:userAvatar})}catch(e2){}
  }
  setTimeout(() => { indicator.style.display = "none"; }, 800);
}

function debouncedSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveCollection(currentUser.uid), 1200);
}

  };

  document.querySelectorAll(".filter-btn").forEach(b => {

  });

  });

  document.querySelectorAll(".card-row").forEach(row => {
    row.onclick = (e) => {
      if (e.target.closest('.eye-btn')) return;
      const n = parseInt(row.dataset.n);
      if (owned.has(n)) owned.delete(n); else owned.add(n);
      debouncedSave();
      renderApp();
    };
  });

  // Sealed row click handlers
  document.querySelectorAll(".sealed-row").forEach(row => {
    row.onclick = () => {
      const sid = row.dataset.sealed;
      if (sealedOwned.has(sid)) sealedOwned.delete(sid); else sealedOwned.add(sid);
      debouncedSave();
      renderApp();
    };
  });

  // Eye preview buttons
  document.querySelectorAll(".eye-btn").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const n = parseInt(btn.dataset.preview);
      showCardPreview(n);
    };
  });

  // Lazy load thumbnails
  const si = getSetInfo();
  
  if (!window._thumbMapPromise || window._thumbMapSet !== si.id) {
    window._thumbMapSet = si.id;
    window._thumbMapPromise = (async () => {
      for (const sid of si.tcgdexIds) {
        for (const lang of ['fr','en']) {
          try {
            const r = await fetch(`https://api.tcgdex.net/v2/${lang}/sets/${sid}`);
            if (!r.ok) continue;
            const data = await r.json();
            if (data.cards && data.cards.length > 10) {
              const map = {};
              data.cards.forEach(c => {
                if (!c.image) return;
                map[c.localId] = c.image;
                const num = parseInt(c.localId);
                if (!isNaN(num)) map[String(num)] = c.image;
              });
              console.log(`TCGdex: ${sid}/${lang} → ${Object.keys(map).length} entries, sample:`, Object.keys(map).slice(0,8));
              return { type:'api', map, sid, lang };
            }
          } catch(e) { continue; }
        }
      }
      return { type:'direct' };
    })();
  }

  const thumbObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        const cn = img.dataset.cn;
        thumbObserver.unobserve(img);
        window._thumbMapPromise.then(result => {
          let urls = [];
          if (result.type === 'api' && result.map[cn]) {
            const b = result.map[cn];
            urls = [b+"/low.webp", b+"/low.png", b+"/high.webp", b+"/high.png"];
          }
          // Always add direct asset URLs as fallback
          for (const sid of si.tcgdexIds) {
            const serie = sid.startsWith('sv') ? 'sv' : 'me';
            for (const lang of ['fr','en']) {
              for (const fmt of ['low.webp','low.png','high.webp','high.png']) {
                urls.push(`https://assets.tcgdex.net/${lang}/${serie}/${sid}/${cn}/${fmt}`);
              }
            }
          }
          let idx = 0;
          function tryNext() {
            if (idx >= urls.length) { img.style.display='none'; return; }
            img.src = urls[idx];
            img.onerror = () => { idx++; tryNext(); };
          }
          tryNext();
        });
      }
    });
  }, {rootMargin: '300px'});
  document.querySelectorAll(".card-thumb").forEach(img => thumbObserver.observe(img));
}

function generateFriendCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function ensureFriendCode() {
  if (!currentUser) return;
  try {
    const snap = await getDoc(doc(db, "users", currentUser.uid));
    if (snap.exists() && snap.data().friendCode) {
      myFriendCode = snap.data().friendCode;
    } else {
      myFriendCode = generateFriendCode();
      await setDoc(doc(db, "users", currentUser.uid), {
        friendCode: myFriendCode,
        displayName: currentUser.displayName || "Dresseur",
        avatar: userAvatar,
        email: currentUser.email || ""
      }, { merge: true });
    }
  } catch (e) { console.warn("Friend code error:", e); }
}

async function updateUserProfile() {
  if (!currentUser) return;
  try {
    await setDoc(doc(db, "users", currentUser.uid), {
      displayName: currentUser.displayName || "Dresseur",
      avatar: userAvatar,
      email: currentUser.email || ""
    }, { merge: true });
  } catch (e) {}
}

async function loadFriends() {
  if (!currentUser) return;
  try {
    const q1 = query(collection(db, "friends"), where("users", "array-contains", currentUser.uid));
    const snap = await getDocs(q1);
    friendsList = [];
    for (const d of snap.docs) {
      const data = d.data();
      const otherUid = data.users.find(u => u !== currentUser.uid);
      if (otherUid) {
        const uSnap = await getDoc(doc(db, "users", otherUid));
        const uData = uSnap.exists() ? uSnap.data() : {};
        friendsList.push({ docId: d.id, uid: otherUid, name: uData.displayName || "Dresseur", avatar: uData.avatar || null, code: uData.friendCode || "" });
      }
    }
    const q2 = query(collection(db, "friendRequests"), where("to", "==", currentUser.uid), where("status", "==", "pending"));
    const snap2 = await getDocs(q2);
    friendRequests = [];
    for (const d of snap2.docs) {
      const data = d.data();
      const uSnap = await getDoc(doc(db, "users", data.from));
      const uData = uSnap.exists() ? uSnap.data() : {};
      friendRequests.push({ docId: d.id, fromUid: data.from, name: uData.displayName || "Dresseur", avatar: uData.avatar || null, code: uData.friendCode || "" });
    }
  } catch (e) { console.warn("Load friends error:", e); }
}

async function sendFriendRequest(code) {
  if (!currentUser) return "Non connect\u00e9";
  code = code.trim().toUpperCase();
  if (code === myFriendCode) return "C'est votre propre code !";
  if (code.length < 4) return "Code invalide";
  try {
    const q = query(collection(db, "users"), where("friendCode", "==", code));
    const snap = await getDocs(q);
    if (snap.empty) return "Aucun dresseur avec ce code";
    const targetUid = snap.docs[0].id;
    const q2 = query(collection(db, "friends"), where("users", "array-contains", currentUser.uid));
    const fSnap = await getDocs(q2);
    for (const d of fSnap.docs) { if (d.data().users.includes(targetUid)) return "D\u00e9j\u00e0 amis !"; }
    const q3 = query(collection(db, "friendRequests"), where("from", "==", currentUser.uid), where("to", "==", targetUid), where("status", "==", "pending"));
    const rSnap = await getDocs(q3);
    if (!rSnap.empty) return "Demande d\u00e9j\u00e0 envoy\u00e9e !";
    await addDoc(collection(db, "friendRequests"), { from: currentUser.uid, to: targetUid, status: "pending", createdAt: new Date().toISOString() });
    return "ok";
  } catch (e) { return "Erreur: " + e.message; }
}

async function acceptFriendRequest(reqDocId, fromUid) {
  await addDoc(collection(db, "friends"), { users: [currentUser.uid, fromUid], createdAt: new Date().toISOString() });
  await deleteDoc(doc(db, "friendRequests", reqDocId));
  await loadFriends();
}

async function rejectFriendRequest(reqDocId) {
  await deleteDoc(doc(db, "friendRequests", reqDocId));
  await loadFriends();
}

async function removeFriend(friendDocId) {
  await deleteDoc(doc(db, "friends", friendDocId));
  await loadFriends();
}

          <span class="progress-count">${have}/${mainTotal}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${gradientFill}"></div></div>
      </div>
      <div class="account-page" style="padding-top:0">
        <button class="account-back" id="back-btn">\u2190 Retour</button>
      </div>
      <div class="card-list" id="card-list">
        ${si.cards.map(c => {
          const isOwned = fOwned.has(c.n);
          const isSecret = c.n > mainTotal;
          let extraClass = isOwned ? 'owned' : 'missing';
          if (isSecret && !isOwned) extraClass += ' secret';
          return '<div class="card-row ' + extraClass + '" style="pointer-events:none">' +
            '<div class="check ' + (isOwned ? 'checked' : '') + '">' + (isOwned ? '\u2713' : '') + '</div>' +
            '<span class="card-num">' + String(c.n).padStart(3, '0') + '</span>' +
            '<span class="card-icon">' + (TYPE_META[c.type] ? TYPE_META[c.type].icon : '') + '</span>' +
            '<span class="card-name">' + c.name + '</span>' +
            '<span class="card-rarity" style="color:' + (RARITY_COLOR[c.rarity] || '#475569') + '">' + (RARITY_SYM[c.rarity] || '') + '</span>' +
            '</div>';
        }).join('')}
      </div>
      ${(si.sealed && si.sealed.length > 0) ? '<div class="card-list" style="padding-top:0"><div class="sealed-section"><div class="friend-section-title" style="margin-top:0">\ud83d\udce6 Scell\u00e9s</div>' +
        si.sealed.map(s => {
          const has = fSealedSet.has(s.id);
          return '<div class="sealed-row ' + (has ? 'owned' : '') + '" style="pointer-events:none"><div class="check ' + (has ? 'checked' : '') + '">' + (has ? '\u2713' : '') + '</div><img class="sealed-icon" src="' + s.img + '" alt=""><span class="sealed-name">' + s.name + '</span></div>';
        }).join('') + '</div></div>' : ''}`;
    document.getElementById("back-btn").onclick = () => { friendViewSet = null; renderFriendCollectionPage(); };
  } else {
    // OVERVIEW: list all sets
    document.getElementById("app-screen").innerHTML = `
      <div class="header">
        <div class="header-top">
          <div>
            <div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt=""><h1>Pok\u00e9Tracker</h1></div>
            <div class="header-sub">Collection de ${viewingFriend.name}</div>
          </div>
        </div>
      </div>
      <div class="account-page">
        <button class="account-back" id="back-btn">\u2190 Retour aux amis</button>
        ${Object.keys(SETS).map(sid => {
          const si = SETS[sid];
          const fCards = friendSets[sid] || [];
          const fOwned = new Set(fCards);
          const mainTotal = si.mainCount;
          const have = si.cards.filter(c => c.n <= mainTotal && fOwned.has(c.n)).length;
          const pct = mainTotal > 0 ? Math.round(have / mainTotal * 100) : 0;
          const secretTotal = si.cards.filter(c => c.n > mainTotal).length;
          const secretHave = si.cards.filter(c => c.n > mainTotal && fOwned.has(c.n)).length;
          const fSealedArr = friendSealed[sid] || [];
          const fSealedSet = new Set(fSealedArr);
          const sealedTotal = si.sealed ? si.sealed.length : 0;
          const sealedHave = si.sealed ? si.sealed.filter(s => fSealedSet.has(s.id)).length : 0;
          const gradientFill = pct === 100 ? "linear-gradient(90deg,#4ade80,#22c55e)" : "linear-gradient(90deg,#e3350d,#ffcb05)";
          return '<div class="friend-set-card" data-friend-set="' + sid + '" style="cursor:pointer">' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">' +
            '<img src="' + si.logo + '" style="height:24px">' +
            '<div style="flex:1"><div style="font-weight:700;font-size:14px;color:var(--text)">' + si.name + '</div>' +
            '<div style="font-size:12px;color:var(--text3)">' + have + '/' + mainTotal + ' cartes' +
            (secretTotal > 0 ? ' \u2022 ' + secretHave + '/' + secretTotal + ' secr\u00e8tes' : '') +
            (sealedTotal > 0 ? ' \u2022 ' + sealedHave + '/' + sealedTotal + ' scell\u00e9s' : '') +
            '</div></div>' +
            '<span style="font-size:18px;font-weight:800;color:' + (pct === 100 ? '#4ade80' : '#60a5fa') + '">' + pct + '%</span></div>' +
            '<div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:' + pct + '%;background:' + gradientFill + '"></div></div>' +
            '</div>';
        }).join('')}
      </div>`;
    document.getElementById("back-btn").onclick = () => { friendViewSet = null; friendData_cache = {}; currentView = "friends"; renderApp(); };
    document.querySelectorAll("[data-friend-set]").forEach(el => {
      el.onclick = () => { friendViewSet = el.dataset.friendSet; renderFriendCollectionPage(); };
    });
  }
}

  document.getElementById("app-screen").innerHTML = `

      <div class="header-top">
        <div>
          <div class="header-title"><img src="logo.png" style="width:28px;height:28px;border-radius:6px" alt=""><h1>PokéTracker</h1></div>
          <div class="header-sub">Mon compte</div>
        </div>
      </div>
    </div>
    <div class="account-page">
      <button class="account-back" id="back-btn">← Retour au tracker</button>
      
      <div class="account-section">
        <h3><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/town-map.png" style="width:18px;height:18px;image-rendering:pixelated;vertical-align:middle;margin-right:4px">Profil</h3>

        <div class="account-label" style="margin-top:12px">Pseudo</div>

        <button class="account-save" id="save-name">Enregistrer</button>
        <div class="account-msg" id="msg-name"></div>
      </div>

      <div class="account-section">
        <h3><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/rare-candy.png" style="width:18px;height:18px;image-rendering:pixelated;vertical-align:middle;margin-right:4px">Email</h3>

        <h3><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/flame-orb.png" style="width:18px;height:18px;image-rendering:pixelated;vertical-align:middle;margin-right:4px">Zone dangereuse</h3>
        <button class="pm-item danger" id="btn-logout-account" style="padding:8px 0"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/escape-rope.png" style="width:18px;height:18px;image-rendering:pixelated;vertical-align:middle;margin-right:4px"> Se déconnecter</button>

    </div>`;

  document.getElementById("back-btn").onclick = () => { currentView = "tracker"; renderApp(); };
  document.getElementById("btn-logout-account").onclick = () => signOut(auth);

  // Render avatar grid
  const avatarGrid = document.getElementById("avatar-grid");
  avatarGrid.innerHTML = AVATARS.map(a =>

  ).join('');
  avatarGrid.querySelectorAll('.avatar-opt').forEach(el => {
    el.onclick = async () => {
      const pid = Number(el.dataset.pid);
      userAvatar = pid;
      avatarGrid.querySelectorAll('.avatar-opt').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      const msg = document.getElementById("msg-avatar");
      try {
        await setDoc(doc(db, "collections", currentUser.uid), { avatar: pid }, { merge: true });
        await updateUserProfile();
        msg.className = "account-msg success"; msg.textContent = "✓ Avatar mis à jour !";
        setTimeout(() => { msg.textContent = ""; }, 2000);
      } catch(e) {
        msg.className = "account-msg error"; msg.textContent = e.message;

        msg.className = "account-msg error"; msg.textContent = msgs[e.code] || e.message;
      }

  }

// ==================== CARD PREVIEW ====================
function showCardPreview(n) {
  const card = getCards().find(c => c.n === n);
  if (!card) return;
  const modal = document.getElementById("card-modal");
  const numPad = String(n).padStart(3, '0');
  const si = getSetInfo();
  
  modal.style.display = "block";
  modal.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <button class="modal-close" id="modal-close">✕</button>
        <div class="modal-loading" id="modal-loading">⏳ Chargement...</div>
        <div class="modal-info">${numPad} — ${card.name}</div>
      </div>
    </div>`;
  
  document.getElementById("modal-close").onclick = closeModal;
  document.getElementById("modal-overlay").onclick = (e) => {
    if (e.target.id === "modal-overlay") closeModal();
  };
  
  // Build list of URLs to try (TCGdex FR, TCGdex EN, pokemontcg.io)
  const urls = [];
  for (const sid of si.tcgdexIds) {
    urls.push({url: `https://api.tcgdex.net/v2/fr/sets/${sid}/${n}`, type: "tcgdex"});
  }
  for (const sid of si.tcgdexIds) {
    urls.push({url: `https://api.tcgdex.net/v2/en/sets/${sid}/${n}`, type: "tcgdex"});
  }
  urls.push({url: `https://api.pokemontcg.io/v2/cards/${si.tcgId.toLowerCase()}-${n}`, type: "ptcgio"});
  
  async function tryUrls() {
    for (const entry of urls) {
      try {
        const r = await fetch(entry.url);
        if (!r.ok) continue;
        const data = await r.json();
        if (entry.type === "tcgdex" && data.image) {
          insertImage(data.image + "/high.webp", card, numPad, modal);
          return;
        }
        if (entry.type === "ptcgio") {
          const imgUrl = data?.data?.images?.large || data?.data?.images?.small;
          if (imgUrl) { insertImage(imgUrl, card, numPad, modal); return; }
        }
      } catch(e) { continue; }
    }
    showFallbackLink(modal);
  }
  tryUrls();
}

function insertImage(url, card, numPad, modal) {
  const loadingEl = modal.querySelector("#modal-loading");
  const img = new Image();
  img.onload = () => {
    if (loadingEl) loadingEl.remove();
    const box = modal.querySelector(".modal-box");
    if (box) {
      const imgEl = document.createElement("img");
      imgEl.src = url;
      imgEl.className = "modal-img";
      imgEl.alt = card.name;
      box.insertBefore(imgEl, box.querySelector(".modal-info"));
    }
  };
  img.onerror = () => showFallbackLink(modal);
  img.src = url;
}

function showFallbackLink(modal) {
  const setCode = getSetInfo().tcgId.toUpperCase();
  const loadingEl = modal.querySelector("#modal-loading");
  if (loadingEl) loadingEl.innerHTML = `
    <div class="modal-error">
      Image non disponible<br><br>
      <a href="https://www.pokecardex.com/series/${setCode}" target="_blank">Voir sur Pokécardex →</a>
    </div>`;
}

function closeModal() {
  const modal = document.getElementById("card-modal");
  modal.style.display = "none";
  modal.innerHTML = "";
}

// Close modal on Escape
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// ==================== AUTH STATE ====================
onAuthStateChanged(auth, async (user) => {
  document.getElementById("loading-screen").style.display = "none";
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";
    await loadCollection(user.uid);
    await ensureFriendCode();
    await loadFriends();
    renderApp();
  } else {
    currentUser = null;
    owned = new Set();
    sealedOwned = new Set();
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app-screen").style.display = "none";
    renderAuth();
  }
});
